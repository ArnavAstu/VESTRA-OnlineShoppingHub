<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - VESTRA</title>

  <link rel="icon" href="./logo/tb.ico">
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #ff3f6c, #ff6f91);
      font-family: "Segoe UI", sans-serif;
    }

    .profile-container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
    }

    .profile-title {
      font-family: "Oswald", sans-serif;
      margin-bottom: 25px;
      color: white;
      text-align: center;
    }

    .profile-card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .profile-info {
      text-align: center;
      margin-bottom: 25px;
    }

    .profile-info strong {
      display: block;
      font-size: 18px;
      color: #333;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg,#ff3f6c,#ff6f91);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      margin: 0 auto 15px;
    }

    .profile-form div {
      margin-bottom: 18px;
    }

    .profile-form strong {
      display: block;
      margin-bottom: 5px;
      color: #444;
    }

    .profile-form div > div {
      color: #888;
      margin-bottom: 5px;
    }

    .profile-form input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.3s;
    }

    .profile-form input:focus {
      border-color: #ff3f6c;
      box-shadow: 0 0 6px rgba(255,63,108,0.3);
    }

    .btn {
      padding: 12px;
      width: 100%;
      border: none;
      background: linear-gradient(135deg,#ff3f6c,#ff6f91);
      color: white;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .logout {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="imag">
      <img src="./logo/input-onlinepngtools.png"
        class="im"
        style="cursor:pointer;"
        onclick="window.location.href='index.html'">
    </div>

    <div class="nav-links">
      <nav>
        <a href="./men.html">MEN</a>
        <a href="./women.html">WOMEN</a>
        <a href="./kids.html">KIDS</a>
        <a href="./footwear.html">FOOTWEAR</a>
        <a href="./beauty.html">BEAUTY</a>
      </nav>
    </div>

    <div class="search">
      <input type="text" id="searchBox" class="ss" placeholder="Search...">
    </div>

    <div class="bag">
      <div class="action">
        <a href="./profile.html"><i class="fa-regular fa-user"></i> <span>Profile</span></a>
      </div>

      <div class="action">
        <a href="./wishlist.html"><i class="fa-regular fa-heart"></i> <span>Wishlist</span></a>
      </div>

      <div class="action">
        <a href="./bag.html"><i class="fa-solid fa-bag-shopping"></i> <span>Bag</span></a>
      </div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="profile-container">

    <h1 class="profile-title">My Profile 👤</h1>

    <div class="profile-card">

      <div class="profile-info">
        <div class="profile-avatar">
          <i class="fa fa-user"></i>
        </div>
        <div id="userInfo"></div>
      </div>

      <div class="profile-form">

        <div>
          <strong>Age:</strong>
          <div id="ageText"></div>
          <input id="age" placeholder="Enter age">
        </div>

        <div>
          <strong>Phone:</strong>
          <div id="phoneText"></div>
          <input id="phone" placeholder="Enter phone">
        </div>

        <div>
          <strong>Address:</strong>
          <div id="addressText"></div>
          <input id="address" placeholder="Enter address">
        </div>

        <button class="btn" onclick="saveProfile()">Save Profile</button>
        <button class="btn logout" onclick="logout()">Logout</button>

      </div>

    </div>

  </div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

let currentUser = {};

async function loadProfile() {

  const res = await fetch("http://localhost:5000/profile", {
    headers: { "Authorization": token }
  });

  const user = await res.json();
  currentUser = user;

  document.getElementById("userInfo").innerHTML = `
    <strong>${user.name}</strong>
    <span>${user.email}</span>
  `;

  ageText.textContent = user.age || "Not set";
  phoneText.textContent = user.phone || "Not set";
  addressText.textContent = user.address || "Not set";

  age.value = user.age || "";
  phone.value = user.phone || "";
  address.value = user.address || "";
}

async function saveProfile() {

  const updated = {
    age: age.value,
    phone: phone.value,
    address: address.value
  };

  await fetch("http://localhost:5000/profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify(updated)
  });

  alert("Profile updated ✅");

  loadProfile();
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

loadProfile();
</script>

</body>
</html>
